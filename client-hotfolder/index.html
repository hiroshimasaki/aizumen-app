<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiZumen HotFolder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="app" class="h-screen flex flex-col p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-database">
                        <path d="M3 5V19a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2Z" />
                        <path d="M3 10h18" />
                        <path d="M3 15h18" />
                        <path d="M10 3v18" />
                    </svg>
                </div>
                <h1 class="text-xl font-black">AiZumen HotFolder</h1>
            </div>
            <div id="auth-status" class="text-sm flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                未ログイン
            </div>
        </header>

        <!-- Login Section -->
        <div id="login-section" class="flex-1 flex items-center justify-center">
            <div class="bg-slate-800 p-8 rounded-2xl border border-white/10 w-full max-w-sm shadow-2xl">
                <h2 class="text-lg font-bold mb-6 text-center">ログイン</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">メールアドレス</label>
                        <input type="email" id="email"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                            placeholder="admin@example.com">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">パスワード</label>
                        <input type="password" id="password"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                            placeholder="••••••••">
                    </div>
                    <button id="login-btn"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg transition-colors mt-4">ログイン</button>
                </div>
            </div>
        </div>

        <!-- Main Content (Hidden by default) -->
        <div id="main-content" class="flex-1 flex flex-col hidden">
            <!-- Folder Setting -->
            <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5 mb-6">
                <label class="block text-xs text-slate-400 mb-2">監視フォルダ</label>
                <div class="flex gap-2">
                    <input type="text" id="folder-path" readonly
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-300"
                        placeholder="フォルダを選択してください...">
                    <button id="select-folder-btn"
                        class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">選択</button>
                </div>
            </div>

            <!-- File List Container -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-slate-400">待機中の図面 (<span id="file-count">0</span>)</h3>
                    <button id="analyze-all-btn" disabled
                        class="px-6 py-2 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl font-bold text-sm shadow-lg shadow-amber-500/25 disabled:opacity-30 transition-all hover:scale-105">一括AI解析</button>
                </div>

                <div id="file-list"
                    class="flex-1 bg-slate-900/50 border border-slate-800 rounded-xl overflow-y-auto p-2 space-y-2">
                    <!-- Files will be injected here -->
                    <div class="h-full flex flex-col items-center justify-center text-slate-600 space-y-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                        <p class="text-xs">図面を監視フォルダに入れてください</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
